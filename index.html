<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINE連携</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:sans-serif;padding:24px;background:#f7f7f7}
    .box{max-width:420px;margin:40px auto;background:#fff;border:1px solid #ddd;border-radius:12px;padding:24px;text-align:center;line-height:1.8;white-space:pre-wrap;word-break:break-word}
  </style>
</head>
<body>
  <div class="box">
    <div id="status">開始します...</div>
  </div>

  <script>
    const LIFF_ID = "2009147779-D056eEd8";
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzMZXYhTjei7bMrjRguIREgo-5KGspRrRbNdkogQfFpVXMf7rmZd3iKzHPnK9XoDOGM/exec";

    function setStatus(msg){
      document.getElementById("status").innerText = msg;
      console.log(msg);
    }

    function parseMemberNoFromText(text) {
      if (!text) return "";

      let value = text;

      // 何回か decode してみる
      for (let i = 0; i < 3; i++) {
        try {
          const decoded = decodeURIComponent(value);
          if (decoded === value) break;
          value = decoded;
        } catch (e) {
          break;
        }
      }

      // ?member_no=1001 / member_no=1001 の両方に対応
      value = value.replace(/^[?#]/, "");
      const params = new URLSearchParams(value);
      return params.get("member_no") || "";
    }

    function getMemberNo() {
      const url = new URL(window.location.href);

      // 1) 普通の ?member_no=1001
      let memberNo = url.searchParams.get("member_no");
      if (memberNo) return memberNo;

      // 2) ?liff.state=%3Fmember_no%3D1001
      let liffState = url.searchParams.get("liff.state");
      memberNo = parseMemberNoFromText(liffState);
      if (memberNo) return memberNo;

      // 3) hash側に入るケース
      const hash = window.location.hash ? window.location.hash.replace(/^#/, "") : "";
      if (hash) {
        const hashParams = new URLSearchParams(hash);

        memberNo = hashParams.get("member_no");
        if (memberNo) return memberNo;

        liffState = hashParams.get("liff.state");
        memberNo = parseMemberNoFromText(liffState);
        if (memberNo) return memberNo;
      }

      return "";
    }

    async function main(){
      try{
        setStatus("LIFFを初期化しています...");
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        setStatus("会員番号を確認しています...");
        const memberNo = getMemberNo();

        if (!memberNo) {
          setStatus("エラー：会員番号がありません\n\n現在のURL:\n" + window.location.href);
          return;
        }

        setStatus("プロフィールを取得しています...");
        const profile = await liff.getProfile();

        setStatus("会員情報を連携しています...");

        const res = await fetch(GAS_API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            member_no: memberNo,
            userId: profile.userId,
            displayName: profile.displayName
          })
        });

        const text = await res.text();
        if (text !== "ok") throw new Error(text);

        setStatus("連携が完了しました。閉じて大丈夫です。");
      } catch(e) {
        setStatus("エラー: " + e.message);
      }
    }

    main();
  </script>
</body>
</html>
